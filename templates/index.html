<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Intelligence Agent</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .chat-container {
            height: calc(100vh - 200px);
            overflow-y: auto;
        }
        .sidebar {
            background-color: #1e293b;
            color: white;
            min-height: 100vh;
        }
        .card {
            border: none;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .message-user {
            background-color: #3b82f6;
            color: white;
            border-radius: 1rem 1rem 0 1rem;
            align-self: flex-end;
        }
        .message-agent {
            background-color: white;
            color: #1e293b;
            border-radius: 1rem 1rem 1rem 0;
            align-self: flex-start;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar p-4 shadow-xl">
                <div class="position-sticky">
                    <h5 class="mb-4 text-white font-bold text-2xl"><i class="fas fa-robot me-2 text-blue-400"></i>RAG Agent</h5>
                    <div class="mb-4">
                        <h6 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Knowledge Base</h6>
                        <form id="uploadForm" class="mb-3">
                            <div class="mb-3">
                                <input type="file" id="fileInput" class="form-control form-control-sm bg-slate-700 text-white border-slate-600" multiple>
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm w-full">
                                <i class="fas fa-upload me-1"></i> Upload Docs
                            </button>
                        </form>
                    </div>
                    <div>
                        <h6 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Loaded Documents</h6>
                        <ul id="documentList" class="list-unstyled text-sm">
                            <!-- Documents will be listed here -->
                        </ul>
                    </div>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2 text-slate-800 font-bold">Intelligent Knowledge Assistant</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button id="clearHistory" class="btn btn-sm btn-outline-secondary">
                            <i class="fas fa-trash-alt me-1"></i> Clear History
                        </button>
                    </div>
                </div>

                <!-- Chat Area -->
                <div class="card p-0 mb-4">
                    <div id="chatWindow" class="card-body chat-container d-flex flex-column p-4 space-y-4">
                        <div class="message-agent p-3 max-w-[80%]">
                            Hello! I am your RAG Knowledge Assistant. Upload some documents and I can answer your questions based on them.
                        </div>
                    </div>
                    <div class="card-footer bg-white p-3">
                        <form id="chatForm" class="input-group">
                            <input type="text" id="userInput" class="form-control border-slate-200 focus:ring-primary-500" placeholder="Ask a question about your documents..." required>
                            <button class="btn btn-primary px-4" type="submit">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const uploadForm = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const documentList = document.getElementById('documentList');
        const clearHistoryBtn = document.getElementById('clearHistory');

        function appendMessage(text, role, sources = []) {
            const div = document.createElement('div');
            div.className = `p-3 max-w-[80%] ${role === 'user' ? 'message-user' : 'message-agent'}`;

            const textSpan = document.createElement('span');
            textSpan.style.whiteSpace = 'pre-wrap';
            textSpan.textContent = text;
            div.appendChild(textSpan);

            if (sources.length > 0) {
                const sourceDiv = document.createElement('div');
                sourceDiv.className = 'mt-2 pt-2 border-t border-slate-100 text-xs italic text-slate-500';
                sourceDiv.textContent = 'Sources: ' + sources.join(', ');
                div.appendChild(sourceDiv);
            }

            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const question = userInput.value.trim();
            if (!question) return;

            appendMessage(question, 'user');
            userInput.value = '';

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await response.json();
                appendMessage(data.answer, 'agent', data.sources);
            } catch (error) {
                appendMessage('Error: Could not get response.', 'agent');
            }
        });

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const files = fileInput.files;
            if (files.length === 0) return;

            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                alert(`Successfully uploaded and processed ${data.count} files.`);
                loadDocuments();
            } catch (error) {
                alert('Error uploading files.');
            }
        });

        async function loadDocuments() {
            try {
                const response = await fetch('/documents');
                const docs = await response.json();
                documentList.innerHTML = '';
                docs.forEach(doc => {
                    const li = document.createElement('li');
                    li.className = 'py-1 text-slate-300 flex items-center';
                    li.innerHTML = `<i class="far fa-file-alt me-2"></i> ${doc}`;
                    documentList.appendChild(li);
                });
            } catch (error) {}
        }

        clearHistoryBtn.addEventListener('click', async () => {
            await fetch('/clear', { method: 'POST' });
            chatWindow.innerHTML = '<div class="message-agent p-3 max-w-[80%]">Conversation cleared. How can I help you now?</div>';
        });

        loadDocuments();
    </script>
</body>
</html>
